<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北航校园跑 - Campus Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #2d3748;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            background: #1a202c;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px #4a5568;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            color: #a0aec0;
        }

        .btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 #276749;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #276749;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #276749;
        }

        .instructions {
            margin-top: 30px;
            font-size: 14px;
            color: #cbd5e0;
            line-height: 1.8;
        }

        .stats {
            margin-top: 30px;
            font-size: 16px;
            color: #e2e8f0;
        }

        .stats div {
            margin: 10px 0;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 4px;
            border: 2px solid #4a5568;
        }

        .level-badge {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .time-badge {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        .distance-badge {
            background: linear-gradient(135deg, #9f7aea 0%, #805ad5 100%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="hud" class="hidden">
            <div class="hud-item level-badge">关卡 <span id="levelDisplay">1</span></div>
            <div class="hud-item time-badge">时间 <span id="timeDisplay">0.0</span>s</div>
            <div class="hud-item distance-badge">距离 <span id="distanceDisplay">0</span>m</div>
        </div>

        <div id="startScreen" class="overlay">
            <div class="title">北航校园跑</div>
            <div class="subtitle">Campus Run - 操场竞速挑战</div>
            <button class="btn" onclick="startGame()">开始游戏</button>
            <div class="instructions">
                <div>🎮 操作说明</div>
                <div>↑ / W - 向上移动</div>
                <div>↓ / S - 向下移动</div>
                <div>← / A - 向左移动</div>
                <div>→ / D - 向右移动</div>
                <div>SHIFT - 加速冲刺</div>
                <div style="margin-top: 15px; color: #ffd700;">在规定时间内跑完指定距离！</div>
            </div>
        </div>

        <div id="levelComplete" class="overlay hidden">
            <div class="title">🎉 关卡完成！</div>
            <div class="stats">
                <div>用时: <span class="highlight" id="finalTime">0.0</span> 秒</div>
                <div>距离: <span class="highlight" id="finalDistance">0</span> 米</div>
                <div>评价: <span class="highlight" id="rating">-</span></div>
            </div>
            <button class="btn" onclick="nextLevel()">下一关</button>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>

        <div id="gameOver" class="overlay hidden">
            <div class="title">⏰ 时间到！</div>
            <div class="stats">
                <div>已完成距离: <span class="highlight" id="gameOverDistance">0</span> 米</div>
            </div>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>

        <div id="allComplete" class="overlay hidden">
            <div class="title">🏆 恭喜通关！</div>
            <div class="subtitle">你已完成所有关卡</div>
            <div class="stats">
                <div>总用时: <span class="highlight" id="totalTime">0.0</span> 秒</div>
            </div>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const TILE_SIZE = 32;
        const COLS = canvas.width / TILE_SIZE;
        const ROWS = canvas.height / TILE_SIZE;

        let gameState = 'start';
        let currentLevel = 1;
        let timeLeft = 0;
        let distance = 0;
        let totalTime = 0;
        let lastTime = 0;

        const levels = [
            { time: 30, distance: 100, speed: 3, name: '热身跑' },
            { time: 25, distance: 150, speed: 3.5, name: '加速跑' },
            { time: 20, distance: 200, speed: 4, name: '冲刺跑' },
            { time: 18, distance: 250, speed: 4.5, name: '极限跑' },
            { time: 15, distance: 300, speed: 5, name: '终极挑战' }
        ];

        const player = {
            x: 100,
            y: canvas.height / 2,
            width: 24,
            height: 32,
            speed: 3,
            baseSpeed: 3,
            sprintSpeed: 5,
            isSprinting: false,
            frame: 0,
            direction: 1,
            legOffset: 0
        };

        const keys = {
            up: false,
            down: false,
            left: false,
            right: false,
            sprint: false
        };

        let obstacles = [];
        let decorations = [];
        let trackLines = [];
        let particles = [];

        function initLevel() {
            const level = levels[currentLevel - 1];
            timeLeft = level.time;
            distance = 0;
            player.speed = level.speed;
            player.baseSpeed = level.speed;
            player.sprintSpeed = level.speed * 1.5;
            player.x = 100;
            player.y = canvas.height / 2;
            
            obstacles = [];
            decorations = [];
            particles = [];
            
            trackLines = [];
            for (let i = 0; i < 6; i++) {
                trackLines.push({
                    y: 120 + i * 60,
                    speed: level.speed
                });
            }

            for (let i = 0; i < 3 + currentLevel; i++) {
                obstacles.push({
                    x: 300 + Math.random() * (canvas.width - 400),
                    y: 100 + Math.random() * (canvas.height - 200),
                    width: 28,
                    height: 36,
                    type: 'child',
                    bounce: Math.random() * Math.PI * 2
                });
            }
        }

        function drawPixelRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x), Math.floor(y), width, height);
        }

        function drawTrack() {
            ctx.fillStyle = '#2d5016';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#c13b1a';
            ctx.fillRect(0, 80, canvas.width, canvas.height - 160);

            ctx.fillStyle = '#e8e8e8';
            ctx.fillRect(0, 75, canvas.width, 5);
            ctx.fillRect(0, canvas.height - 85, canvas.width, 5);

            for (let i = 0; i < trackLines.length; i++) {
                const line = trackLines[i];
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(0, line.y, canvas.width, 4);
            }

            ctx.fillStyle = '#4a7c23';
            ctx.fillRect(0, 0, canvas.width, 75);
            ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

            for (let i = 0; i < canvas.width; i += 40) {
                drawPixelRect(i, 0, 20, 75, '#3d6820');
                drawPixelRect(i + 20, canvas.height - 80, 20, 80, '#3d6820');
            }
        }

        function drawDecorations() {
        }

        function drawPlayer() {
            const px = Math.floor(player.x);
            const py = Math.floor(player.y);
            
            const armOffset = Math.sin(player.legOffset) * 4;
            const bodyBob = Math.sin(player.legOffset * 0.8) * 2;
            
            ctx.fillStyle = '#795548';
            drawPixelRect(px - 6, py - 20, 12, 6, '#795548');
            
            drawPixelRect(px - 3, py - 23, 6, 4, '#795548');
            
            ctx.fillStyle = '#ffcc80';
            drawPixelRect(px - 6, py - 14 + bodyBob, 12, 10, '#ffcc80');
            
            ctx.fillStyle = '#424242';
            drawPixelRect(px - 3, py - 12 + bodyBob, 2, 2, '#424242');
            drawPixelRect(px + 2, py - 12 + bodyBob, 2, 2, '#424242');
            
            ctx.fillStyle = '#0288d1';
            drawPixelRect(px - 1, py - 9 + bodyBob, 2, 3, '#0288d1');
            
            ctx.fillStyle = '#1976d2';
            drawPixelRect(px - 8, py - 4 + bodyBob, 16, 18, '#1976d2');
            
            ctx.fillStyle = '#ffc107';
            drawPixelRect(px - 6, py - 2 + bodyBob, 4, 4, '#ffc107');
            
            ctx.fillStyle = '#1565c0';
            drawPixelRect(px - 8, py + 8 + armOffset + bodyBob, 5, 10, '#1565c0');
            drawPixelRect(px + 3, py + 8 - armOffset + bodyBob, 5, 10, '#1565c0');
            
            const legOffset = Math.sin(player.legOffset) * 4;
            ctx.fillStyle = '#37474f';
            drawPixelRect(px - 5, py + 14 + bodyBob, 5, 12, '#37474f');
            drawPixelRect(px, py + 14 + bodyBob, 5, 12, '#37474f');
            
            ctx.fillStyle = '#8d6e63';
            drawPixelRect(px - 5, py + 24 + legOffset + bodyBob, 5, 4, '#8d6e63');
            drawPixelRect(px, py + 24 - legOffset + bodyBob, 5, 4, '#8d6e63');
            
            if (player.isSprinting) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                for (let i = 0; i < 5; i++) {
                    drawPixelRect(px - 15 - i * 6, py - 5 + i * 5, 10, 5, 'rgba(255, 255, 255, 0.3)');
                }
            }
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                const bounceOffset = Math.sin(Date.now() / 300 + obs.bounce) * 3;
                
                drawPixelRect(obs.x - 6, obs.y - 18 + bounceOffset, 12, 14, '#ffcc80');
                
                drawPixelRect(obs.x - 8, obs.y - 8 + bounceOffset, 16, 16, '#ff5252');
                
                drawPixelRect(obs.x - 5, obs.y + 8 + bounceOffset, 5, 10, '#37474f');
                drawPixelRect(obs.x, obs.y + 8 + bounceOffset, 5, 10, '#37474f');
                
                drawPixelRect(obs.x - 2, obs.y - 14 + bounceOffset, 2, 2, '#424242');
                drawPixelRect(obs.x + 2, obs.y - 14 + bounceOffset, 2, 2, '#424242');
                
                drawPixelRect(obs.x - 8, obs.y - 16 + bounceOffset, 3, 4, '#795548');
                drawPixelRect(obs.x + 5, obs.y - 16 + bounceOffset, 3, 4, '#795548');
            });
        }

        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function createParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 4 + 2,
                    life: 1
                });
            }
        }

        function update(deltaTime) {
            if (gameState !== 'playing') return;

            const level = levels[currentLevel - 1];
            timeLeft -= deltaTime;
            totalTime += deltaTime;

            if (timeLeft <= 0) {
                gameOver();
                return;
            }

            let dx = 0;
            let dy = 0;
            
            if (keys.up) dy -= player.speed;
            if (keys.down) dy += player.speed;
            if (keys.left) dx -= player.speed;
            if (keys.right) dx += player.speed;

            if (keys.sprint && (dx !== 0 || dy !== 0)) {
                player.isSprinting = true;
                player.speed = player.sprintSpeed;
            } else {
                player.isSprinting = false;
                player.speed = player.baseSpeed;
            }

            player.x += dx;
            player.y += dy;

            player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
            player.y = Math.max(100, Math.min(canvas.height - 100, player.y));

            if (dx !== 0 || dy !== 0) {
                player.legOffset += 0.3;
                if (player.isSprinting && Math.random() > 0.7) {
                    createParticles(player.x, player.y + 20);
                }
            }

            let speedMultiplier = 1;
            if (dx > 0) {
                speedMultiplier = 1.5;
            } else if (dx < 0) {
                speedMultiplier = 0.5;
            }
            
            distance += player.baseSpeed * speedMultiplier * deltaTime * 10;

            obstacles.forEach(obs => {
                obs.x -= player.speed * 0.5;
                if (obs.x < -50) {
                    obs.x = canvas.width + 50 + Math.random() * 200;
                    obs.y = 100 + Math.random() * (canvas.height - 200);
                }

                if (checkCollision(player, obs)) {
                    player.x -= 20;
                    distance = Math.max(0, distance - 5);
                    createParticles(player.x, player.y);
                }
            });

            if (distance >= level.distance) {
                levelComplete();
            }

            updateHUD();
        }

        function checkCollision(p, obs) {
            return p.x - p.width/2 < obs.x + obs.width/2 &&
                   p.x + p.width/2 > obs.x - obs.width/2 &&
                   p.y - p.height/2 < obs.y + obs.height/2 &&
                   p.y + p.height/2 > obs.y - obs.height/2;
        }

        function updateHUD() {
            document.getElementById('levelDisplay').textContent = currentLevel;
            document.getElementById('timeDisplay').textContent = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('distanceDisplay').textContent = Math.floor(distance);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawTrack();
            drawDecorations();
            drawObstacles();
            drawPlayer();
            drawParticles();

            if (gameState === 'playing') {
                const level = levels[currentLevel - 1];
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(10, canvas.height - 30, 200, 20);
                
                const progress = Math.min(distance / level.distance, 1);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(12, canvas.height - 28, progress * 196, 16);
                
                ctx.fillStyle = 'white';
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(`${Math.floor(distance)}/${level.distance}m`, 110, canvas.height - 16);
            }
        }

        function gameLoop(timestamp) {
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            currentLevel = 1;
            totalTime = 0;
            initLevel();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
        }

        function levelComplete() {
            gameState = 'levelComplete';
            
            document.getElementById('finalTime').textContent = (levels[currentLevel - 1].time - timeLeft).toFixed(1);
            document.getElementById('finalDistance').textContent = Math.floor(distance);
            
            const timeUsed = levels[currentLevel - 1].time - timeLeft;
            const targetTime = levels[currentLevel - 1].time * 0.6;
            
            let rating = '⭐';
            if (timeUsed < targetTime * 0.7) rating = '⭐⭐⭐';
            else if (timeUsed < targetTime) rating = '⭐⭐';
            
            document.getElementById('rating').textContent = rating;
            document.getElementById('levelComplete').classList.remove('hidden');
        }

        function nextLevel() {
            document.getElementById('levelComplete').classList.add('hidden');
            
            if (currentLevel >= levels.length) {
                document.getElementById('totalTime').textContent = totalTime.toFixed(1);
                document.getElementById('allComplete').classList.remove('hidden');
                gameState = 'allComplete';
            } else {
                currentLevel++;
                initLevel();
                gameState = 'playing';
            }
        }

        function gameOver() {
            gameState = 'gameOver';
            document.getElementById('gameOverDistance').textContent = Math.floor(distance);
            document.getElementById('gameOver').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
        }

        function restartGame() {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            gameState = 'start';
            currentLevel = 1;
            totalTime = 0;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'Shift') keys.sprint = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === 'Shift') keys.sprint = false;
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
